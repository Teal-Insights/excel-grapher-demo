{% if gdp.enabled %}
<form
  class="gdp-controls"
  id="gdp-controls"
  style="display:flex;"
  aria-hidden="false"
  hx-post="/figure1/gdp-shock"
  hx-trigger="input delay:150ms"
  hx-target="#charts"
  hx-swap="innerHTML"
>
  <label id="gdp-label" for="gdp-bps">{{ gdp.label }} — {{ gdp.cell }}</label>
  <input
    type="range"
    id="gdp-bps"
    name="bps"
    min="{{ gdp.bps_min }}"
    max="{{ gdp.bps_max }}"
    step="1"
    value="{{ gdp.bps }}"
  />
  <span id="gdp-readout">{{ gdp.readout }}</span>
</form>
{% endif %}
